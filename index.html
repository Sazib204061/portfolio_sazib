  <head>

    <style>
      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       THEME TOKENS â€” Claude.com system
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      :root {
        --canvas: #faf9f5;
        --surface-soft: #f5f0e8;
        --surface-card: #efe9de;
        --surface-cream-strong: #e8e0d2;
        --surface-dark: #0B2B26;
        --surface-dark-elevated: #163832;
        --surface-dark-soft: #051F20;

        --primary: #235347;
        --primary-active: #163832;
        --primary-disabled: #c8ddd4;
        --accent-teal: #8EB69B;
        --accent-amber: #8EB69B;

        --hairline: #e6dfd8;
        --hairline-soft: #ebe6df;

        --ink: #141413;
        --body-strong: #252523;
        --body: #3d3d3a;
        --muted: #6c6a64;
        --muted-soft: #8e8b82;
        --on-primary: #ffffff;
        --on-dark: #faf9f5;
        --on-dark-soft: #a09d96;

        --success: #5db872;

        --display: "Cormorant Garamond", "Times New Roman", serif;
        --body-font:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        --mono: "JetBrains Mono", monospace;

        --max: 1180px;
        --pad: clamp(24px, 5vw, 48px);
        --section: 96px;

        --r-md: 8px;
        --r-lg: 12px;
        --r-xl: 16px;
        --r-pill: 9999px;
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       BASE
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }
      body {
        font-family: var(--body-font);
        background: var(--canvas);
        color: var(--body);
        overflow-x: hidden;
        font-weight: 400;
        line-height: 1.55;
      }
      a {
        color: var(--primary);
        text-decoration: none;
        transition: opacity 0.2s;
      }
      a:hover {
        opacity: 0.72;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--canvas);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--hairline);
        border-radius: 3px;
      }

      h1,
      h2,
      h3 {
        font-family: var(--display);
        font-weight: 400;
        color: var(--ink);
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       PROGRESS BAR
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      #progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--primary), var(--accent-amber));
        z-index: 9999;
        width: 0%;
        transition: width 0.1s;
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       NAV
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      nav {
        position: sticky;
        top: 0;
        z-index: 800;
        background: rgba(250, 249, 245, 0.92);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--hairline);
      }
      .nav-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 var(--pad);
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 64px;
      }
      .nav-name {
        font-family: var(--body-font);
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        letter-spacing: -0.01em;
      }
      .logo-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: var(--r-md);
        background: var(--primary);
        color: var(--on-primary);
        font-family: var(--display);
        font-weight: 600;
        font-size: 1.05rem;
        flex-shrink: 0;
      }
      .footer-name .logo-mark {
        width: 38px;
        height: 38px;
        font-size: 1.3rem;
        border-radius: var(--r-md);
      }
      .nav-links {
        list-style: none;
        display: flex;
        gap: 1.9rem;
      }
      .nav-links a {
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 500;
        text-decoration: none;
        position: relative;
        transition: color 0.2s;
      }
      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 0;
        height: 1.5px;
        background: var(--primary);
        transition: width 0.25s ease;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--ink);
        opacity: 1;
      }
      .nav-links a:hover::after,
      .nav-links a.active::after {
        width: 100%;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 1.6rem;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--primary);
        color: var(--on-primary);
        font-size: 0.875rem;
        font-weight: 500;
        padding: 11px 22px;
        height: 40px;
        border-radius: var(--r-md);
        border: none;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.2s;
        text-decoration: none;
      }
      .btn-primary:hover {
        background: var(--primary-active);
        opacity: 1;
        transform: translateY(-1px);
      }
      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--canvas);
        color: var(--ink);
        font-size: 0.875rem;
        font-weight: 500;
        padding: 11px 22px;
        height: 40px;
        border-radius: var(--r-md);
        border: 1px solid var(--hairline);
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }
      .btn-secondary:hover {
        border-color: var(--ink);
        opacity: 1;
        transform: translateY(-1px);
      }
      #nav-toggle {
        display: none;
        background: none;
        border: 1px solid var(--hairline);
        border-radius: var(--r-md);
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        color: var(--ink);
        cursor: pointer;
      }
      .nav-links-mobile {
        display: none;
        flex-direction: column;
        list-style: none;
        border-top: 1px solid var(--hairline);
        background: var(--canvas);
      }
      .nav-links-mobile.open {
        display: flex;
      }
      .nav-links-mobile li a {
        display: block;
        padding: 0.9rem var(--pad);
        color: var(--body);
        font-size: 0.9rem;
        font-weight: 500;
        border-bottom: 1px solid var(--hairline-soft);
      }
      .nav-links-mobile li a.active {
        color: var(--primary);
      }
      @media (max-width: 860px) {
        .nav-links {
          display: none;
        }
        .btn-primary {
          display: none;
        }
        #nav-toggle {
          display: flex;
        }
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       HERO
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      .hero {
        max-width: var(--max);
        margin: 0 auto;
        padding: var(--section) var(--pad) 64px;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 56px;
        align-items: center;
        min-height: calc(100vh - 64px);
      }
      .hero > div,
      .code-window {
        min-width: 0;
      }
      .hero-eyebrow {
        font-family: var(--mono);
        font-size: 0.74rem;
        color: var(--primary);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        opacity: 0;
        animation: fadeUp 0.6s 0.1s forwards;
      }
      .hero h1 {
        font-size: clamp(2.6rem, 5.4vw, 4.3rem);
        line-height: 1.06;
        letter-spacing: -0.02em;
        margin-bottom: 1.1rem;
        opacity: 0;
        animation: fadeUp 0.6s 0.2s forwards;
      }
      .hero h1 em {
        font-style: italic;
        color: var(--primary);
      }
      .hero-sub {
        font-size: 1.05rem;
        color: var(--body);
        max-width: 520px;
        margin-bottom: 1.8rem;
        opacity: 0;
        animation: fadeUp 0.6s 0.3s forwards;
      }
      .hero-meta {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 1.8rem;
        opacity: 0;
        animation: fadeUp 0.6s 0.4s forwards;
      }
      .hero-meta span {
        font-size: 0.85rem;
        font-family: var(--mono);
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }
      .hero-meta i {
        width: 14px;
        color: var(--accent-teal);
        font-size: 0.8rem;
      }
      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        opacity: 0;
        animation: fadeUp 0.6s 0.5s forwards;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* hero right â€” orbiting decoration */
      .code-orbit {
        position: relative;
      }
      .orbit-ring {
        position: absolute;
        inset: -28px;
        border: 1px dashed var(--hairline);
        border-radius: 50%;
        z-index: -1;
        pointer-events: none;
      }
      .orbit-dot {
        position: absolute;
        inset: -28px;
        animation: spin 60s linear infinite;
        animation-delay: var(--d, 0s);
        pointer-events: none;
        z-index: 2;
      }
      .orbit-icon {
        position: absolute;
        top: -16px;
        left: 50%;
        transform: translateX(-50%);
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface-card);
        border: 1px solid var(--hairline);
        border-radius: 50%;
        color: var(--primary);
        font-size: 0.95rem;
        box-shadow: 0 4px 14px rgba(20, 20, 19, 0.1);
        animation: spin-rev 60s linear infinite;
        animation-delay: var(--d, 0s);
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes spin-rev {
        from {
          transform: translateX(-50%) rotate(0deg);
        }
        to {
          transform: translateX(-50%) rotate(-360deg);
        }
      }
      @media (max-width: 860px) {
        .orbit-ring,
        .orbit-dot {
          display: none;
        }
      }

      /* hero right â€” code window */
      .code-window {
        background: var(--surface-dark);
        border-radius: var(--r-lg);
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.7s 0.35s forwards;
      }
      .code-window-bar {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 12px 16px;
        background: var(--surface-dark-elevated);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot.red {
        background: #e0645b;
      }
      .dot.yellow {
        background: #e8c15a;
      }
      .dot.green {
        background: #5db872;
      }
      .code-window-bar .fname {
        margin-left: 10px;
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--on-dark-soft);
      }
      .code-window pre {
        padding: 22px 20px;
        font-family: var(--mono);
        font-size: 0.78rem;
        line-height: 1.85;
        color: var(--on-dark-soft);
        overflow-x: auto;
      }
      .code-window pre .k {
        color: #e3a26b;
      }
      .code-window pre .s {
        color: #9bcf9b;
      }
      .code-window pre .c {
        color: #6f6c66;
      }
      .code-window pre .p {
        color: #7ab4f5;
      }
      .code-window pre .f {
        color: var(--on-dark);
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       LAYOUT
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      .page {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 var(--pad);
      }
      .sec {
        padding: var(--section) 0;
      }
      .sec.tight {
        padding-top: 0;
      }
      .sec-head {
        display: flex;
        align-items: baseline;
        gap: 0.8rem;
        margin-bottom: 2.5rem;
      }
      .sec-head.sub {
        margin-top: 5rem;
      }
      .sec-num {
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--primary);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .sec-head h2 {
        font-size: clamp(1.9rem, 3.4vw, 2.6rem);
        letter-spacing: -0.01em;
        min-width: 0;
      }
      .sec-line {
        flex: 1;
        height: 1px;
        background: var(--hairline);
        position: relative;
        top: -4px;
      }

      /* full-bleed section bands */
      .band {
        width: 100%;
      }
      .band-soft {
        background: var(--surface-soft);
      }
      .band-dark {
        background: var(--surface-dark);
        color: var(--on-dark);
      }
      .band-dark h2 {
        color: var(--on-dark);
      }
      .band-dark .sec-num {
        color: var(--accent-amber);
      }
      .band-dark .sec-line {
        background: var(--surface-dark-elevated);
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       REVEAL
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      .reveal {
        opacity: 0;
        transform: translateY(22px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .reveal.visible {
        opacity: 1;
        transform: none;
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       ABOUT
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */

      .page.sec {
        padding: 25px;
      }

      .about-grid {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        gap: 3rem;
        align-items: start;
      }
      .about-text p {
        font-size: 0.95rem;
        line-height: 1.85;
        color: var(--body);
        margin-bottom: 1rem;
      }
      .about-text p:last-child {
        margin-bottom: 0;
      }
      .about-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.9rem;
      }
      .about-photo {
        grid-column: 1 / -1;
        width: 140px;
        height: 140px;
        object-fit: cover;
        border-radius: 50%;
        border: 1px solid var(--hairline);
        margin: 0 auto 0.4rem;
      }
      .stat-box {
        padding: 1.4rem 1.3rem;
        border: 1px solid var(--hairline);
        border-radius: var(--r-lg);
        background: var(--canvas);
        position: relative;
        overflow: hidden;
        transition:
          transform 0.25s,
          box-shadow 0.25s;
      }
      .stat-box::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        width: 0%;
        background: var(--primary);
        transition: width 0.35s ease;
      }
      .stat-box:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(20, 20, 19, 0.08);
      }
      .stat-box:hover::before {
        width: 100%;
      }
      .stat-num {
        font-family: var(--display);
        font-size: 2.1rem;
        font-weight: 600;
        color: var(--primary);
        line-height: 1;
        margin-bottom: 0.2rem;
      }
      .stat-label {
        font-size: 0.7rem;
        color: var(--muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       TAGS / BADGES
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
      .tags {
        display: flex;
        flex-wrap: wrap;
